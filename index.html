<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社團簽到系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --input-bg: rgba(243, 244, 246, 0.8);
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .bg-blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--primary-gradient);
            filter: blur(80px);
            opacity: 0.2;
            z-index: -1;
            border-radius: 50%;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
        }

        .card {
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
        }

        .card-title {
            color: #2d3436;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #636e72;
            margin-bottom: 6px;
            padding-left: 4px;
        }

        .form-control {
            border: 1px solid transparent;
            background-color: var(--input-bg);
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.25s ease;
            color: #2d3436;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .password-field {
            border-left: 4px solid #ff7675 !important;
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 15px rgba(118, 75, 162, 0.25);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(118, 75, 162, 0.35);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            background: #95a5a6;
        }

        #statusMessage {
            font-size: 0.95rem;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card">
        <h2 class="text-center fw-bold card-title">社團點名</h2>

        <form id="checkinForm">
            <div class="mb-3">
                <label for="password" class="form-label">簽到密碼</label>
                <input type="password" class="form-control password-field" id="password" placeholder="••••"
                    inputmode="numeric" pattern="[0-9]*" required>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label for="classNo" class="form-label">班級</label>
                    <input type="tel" class="form-control" id="classNo" pattern="\d{3}" placeholder="209" required>
                </div>
                <div class="col-6">
                    <label for="seatNo" class="form-label">座號</label>
                    <input type="tel" class="form-control" id="seatNo" pattern="\d{1,2}" placeholder="07" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="pcNo" class="form-label">電腦編號</label>
                <input type="tel" class="form-control" id="pcNo" pattern="\d+" placeholder="00"
                    style="border-left: 4px solid #55efc4 !important;" required>
            </div>

            <div class="mb-3">
                <label for="studentId" class="form-label">學號</label>
                <input type="tel" class="form-control" pattern="\d{6}" id="studentId" placeholder="110001" required>
            </div>

            <div class="mb-4">
                <label for="name" class="form-label">姓名</label>
                <input type="text" class="form-control" id="name" placeholder="請輸入姓名" required>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                確認簽到
            </button>
        </form>

        <div id="statusMessage" class="mt-3 text-center fw-bold p-2"></div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxVRfwR2HqPUx2Pxg6EBVkKvV07wlwrPM_xi5mUzts6Nb30GhrF5-3DtD9ncDV0VhT6/exec';

        document.getElementById('checkinForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('statusMessage');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> 處理中...';
            msg.innerHTML = '';

            try {
                const userIP = await fetch('https://api.ipify.org?format=json')
                    .then(res => res.json())
                    .then(data => data.ip)
                    .catch(() => '無法取得 IP');

                const payload = {
                    password: document.getElementById('password').value,
                    classNo: document.getElementById('classNo').value,
                    seatNo: document.getElementById('seatNo').value,
                    pcNo: document.getElementById('pcNo').value,
                    studentId: document.getElementById('studentId').value,
                    name: document.getElementById('name').value,
                    ip: userIP,
                    ua: navigator.userAgent
                };

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    redirect: 'follow'
                });

                const data = await response.json();

                if (data.result === 'success') {
                    document.getElementById('checkinForm').style.display = 'none';
                    msg.innerHTML = '<div style="font-size: 1.5rem; color: #00b894;">簽到成功！</div>';
                } else if (data.result === 'wrong_password') {
                    throw new Error('密碼錯誤');
                } else if (data.result === 'duplicate_pc') {
                    throw new Error(`電腦編號 ${data.pcNo} 已簽到`);
                } else {
                    throw new Error('發生錯誤');
                }
            } catch (error) {
                msg.innerHTML = error.message;
                msg.style.color = '#ff7675';
                btn.disabled = false;
                btn.innerHTML = '重新送出簽到';
            }
        });
    </script>
</body>

</html>
